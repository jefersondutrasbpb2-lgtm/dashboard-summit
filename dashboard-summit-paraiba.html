<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Summit Paraíba 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0b0d;--bg2:#12141a;--bg3:#181b22;--bg-elev:#1c2029;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#f5f6f8;--muted:#8b8f9c;--muted2:#5b5f6b;
  --accent:#5b8cff;--accent2:#3a6cf5;--accent-glow:rgba(91,140,255,0.25);
  --green:#3ee08f;--green-bg:rgba(62,224,143,0.12);
  --red:#ff6b7a;--red-bg:rgba(255,107,122,0.12);
  --amber:#ffc24b;--amber-bg:rgba(255,194,75,0.12);
  --purple:#b18aff;--purple-bg:rgba(177,138,255,0.12);
  --teal:#2fe0d0;--teal-bg:rgba(47,224,208,0.12);
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:16px;--radius-sm:10px;
  --shadow:0 1px 2px rgba(0,0,0,0.4),0 8px 24px -8px rgba(0,0,0,0.5);
  --shadow-hover:0 1px 2px rgba(0,0,0,0.4),0 16px 40px -12px rgba(0,0,0,0.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;
  background:
    radial-gradient(900px 500px at 8% -10%,rgba(91,140,255,0.10),transparent 60%),
    radial-gradient(700px 500px at 100% 0%,rgba(177,138,255,0.08),transparent 55%),
    var(--bg);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
}
.shell{max-width:1360px;margin:0 auto;padding:32px 32px 56px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px}
.brand-dot{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;box-shadow:0 6px 18px -4px var(--accent-glow);letter-spacing:-0.02em}
.brand-name{font-size:16px;font-weight:700;letter-spacing:-0.01em}
.brand-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-group{display:flex;gap:4px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:4px}
.filter-btn{font-family:var(--font);font-size:12px;font-weight:500;padding:7px 15px;border-radius:20px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s}
.filter-btn:hover{color:var(--text)}
.filter-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 12px -2px var(--accent-glow)}
.refresh-btn{font-family:var(--font);font-size:12px;font-weight:500;padding:9px 16px;border-radius:24px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.2s}
.refresh-btn:hover{border-color:var(--accent);background:var(--bg3);transform:translateY(-1px)}
.refresh-btn:active{transform:translateY(0)}
.refresh-btn svg{width:13px;height:13px}
.meta-input{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:6px 8px 6px 16px}
.meta-input label{font-size:11px;color:var(--muted);white-space:nowrap;font-weight:500}
.meta-input input{font-family:var(--mono);font-size:12px;width:70px;padding:6px 10px;border-radius:16px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);text-align:center;font-weight:500}
.meta-input input:focus{outline:none;border-color:var(--accent)}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:18px}
.spinner{width:34px;height:34px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--muted);font-weight:500}
.error-box{background:var(--red-bg);border:1px solid rgba(255,107,122,0.25);border-radius:var(--radius);padding:22px 26px;margin:24px 0;color:var(--red);font-size:13px;line-height:1.8}
.empty-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:40px 24px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8;box-shadow:var(--shadow)}

/* META PROGRESS */
.meta-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;margin-bottom:16px;box-shadow:var(--shadow);animation:fadeUp 0.4s ease both}
.meta-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.meta-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.01em}
.meta-pct{font-size:26px;font-weight:700;color:var(--accent);letter-spacing:-0.02em}
.meta-sub{font-size:11px;color:var(--muted);margin-top:2px}
.progress-track{height:9px;background:var(--bg3);border-radius:6px;overflow:hidden;margin-bottom:12px;box-shadow:inset 0 1px 2px rgba(0,0,0,0.3)}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width 1s cubic-bezier(.16,1,.3,1);box-shadow:0 0 12px var(--accent-glow)}
.meta-stats{display:flex;gap:28px;flex-wrap:wrap}
.meta-stat{font-size:12px;color:var(--muted)}
.meta-stat strong{color:var(--text);font-weight:600}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;box-shadow:var(--shadow);animation:fadeUp 0.4s ease both}
.kpi-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0.9}
.kpi-card::after{content:'';position:absolute;top:-30%;right:-20%;width:120px;height:120px;border-radius:50%;opacity:0.08;filter:blur(4px)}
.kpi-card.green::before{background:linear-gradient(90deg,var(--green),transparent)}
.kpi-card.red::before{background:linear-gradient(90deg,var(--red),transparent)}
.kpi-card.amber::before{background:linear-gradient(90deg,var(--amber),transparent)}
.kpi-card.purple::before{background:linear-gradient(90deg,var(--purple),transparent)}
.kpi-card.teal::before{background:linear-gradient(90deg,var(--teal),transparent)}
.kpi-card.green::after{background:var(--green)}
.kpi-card.red::after{background:var(--red)}
.kpi-card.amber::after{background:var(--amber)}
.kpi-card.purple::after{background:var(--purple)}
.kpi-card.teal::after{background:var(--teal)}
.kpi-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;font-weight:600}
.kpi-value{font-size:25px;font-weight:700;line-height:1;margin-bottom:7px;letter-spacing:-0.02em}
.kpi-value.green{color:var(--green)}
.kpi-value.red{color:var(--red)}
.kpi-value.amber{color:var(--amber)}
.kpi-value.purple{color:var(--purple)}
.kpi-value.teal{color:var(--teal)}
.kpi-delta{font-size:11.5px;color:var(--muted);font-weight:500}

/* CHARTS */
.row2{display:grid;grid-template-columns:minmax(0,1.8fr) minmax(0,1fr);gap:14px;margin-bottom:14px}
.row3{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:14px;margin-bottom:14px}
.row4{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(0,1fr);gap:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);transition:border-color 0.2s;animation:fadeUp 0.45s ease both}
.card:hover{border-color:var(--border2)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:13.5px;font-weight:600;color:var(--text);letter-spacing:-0.01em}
.card-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.chart-wrap{position:relative;height:200px}
.chart-wrap-sm{position:relative;height:150px}

/* BARRAS */
.utm-section{margin-bottom:14px}
.utm-section:last-child{margin-bottom:0}
.utm-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:9px;font-weight:600}
.bar-item{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.bar-name{font-size:11.5px;color:var(--muted);width:150px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.bar-name.wide{width:230px}
.bar-track{flex:1;height:6px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(.16,1,.3,1)}
.bar-val{font-size:11px;color:var(--muted);font-family:var(--mono);width:54px;text-align:right;flex-shrink:0}

/* TABELA */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted2);font-weight:600;text-align:left;padding:0 10px 10px 0;border-bottom:1px solid var(--border)}
tbody td{font-size:12.5px;color:var(--text);padding:11px 10px 11px 0;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background 0.15s}
tbody tr:hover td{background:rgba(255,255,255,0.025)}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.01em}
.badge.ap{background:var(--green-bg);color:var(--green)}
.badge.cn{background:var(--red-bg);color:var(--red)}
.badge.re{background:var(--amber-bg);color:var(--amber)}
.badge.ot{background:var(--bg3);color:var(--muted)}
.td-mono{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* PROD */
.prod-item{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.prod-item:last-child{margin-bottom:0}
.prod-rank{font-size:10px;color:var(--muted2);font-family:var(--mono);width:14px;flex-shrink:0}
.prod-name{font-size:11.5px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.prod-track{width:60px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;flex-shrink:0}
.prod-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(.16,1,.3,1)}
.prod-val{font-size:11px;color:var(--muted);font-family:var(--mono);width:58px;text-align:right;flex-shrink:0}

/* PAGAMENTO / CUPOM */
.pill-list{display:flex;flex-direction:column;gap:7px}
.pill-item{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border);transition:border-color 0.15s}
.pill-item:hover{border-color:var(--border2)}
.pill-name{font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-weight:500}
.pill-count{font-size:11px;color:var(--muted);font-family:var(--mono);margin-left:10px;flex-shrink:0}
.pill-val{font-size:11px;color:var(--green);font-family:var(--mono);margin-left:10px;flex-shrink:0;font-weight:500}

.footer{margin-top:32px;padding-top:18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--muted2);flex-wrap:wrap;gap:8px}
.footer-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:pulse 2s infinite;box-shadow:0 0 8px var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.no-data{font-size:11.5px;color:var(--muted);padding:10px 0}
@media(max-width:1000px){.kpi-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.row2,.row4{grid-template-columns:minmax(0,1fr)}.row3{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:640px){.shell{padding:16px}.kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.row3{grid-template-columns:minmax(0,1fr)}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot">S</div>
      <div>
        <div class="brand-name">Summit Paraíba 2026</div>
        <div class="brand-sub">Dashboard de vendas — Goexplosion</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="meta-input">
        <label>Meta de ingressos:</label>
        <input type="number" id="meta-input" value="500" min="1">
      </div>
      <div class="filter-group" id="period-filters">
        <button class="filter-btn" data-period="7">7 dias</button>
        <button class="filter-btn active" data-period="30">30 dias</button>
        <button class="filter-btn" data-period="90">90 dias</button>
        <button class="filter-btn" data-period="0">Tudo</button>
      </div>
      <button class="refresh-btn" id="refresh-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Atualizar
      </button>
    </div>
  </div>
  <div id="main-content">
    <div class="loading-screen"><div class="spinner"></div><div class="loading-text">Carregando dados da planilha...</div></div>
  </div>
</div>
<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3P6ys5bpL8DcWRSplSkeUZA8e-6UewA05L8qVVx2m9SevtZBpVhrTun3oYLBINkg/exec';
// URL do proxy do Meta Ads (Apps Script separado, ver meta-ads-proxy.gs). Deixe vazio para ocultar a comparação de ROAS.
var SCRIPT_URL_META = '';

var C = {
  ordemID:0,produtoID:1,tipoEvento:2,dataTransacao:3,produto:4,
  quantidade:5,email:6,nomeComprador:7,celular:8,
  endRua:9,endNumero:10,endComplemento:11,endCEP:12,endCidade:13,
  endEstado:14,endPais:15,endReferencia:16,endBairro:17,
  dataCompra:18,status:19,descStatus:20,dataAutorizacao:21,
  serialHashed:22,metodoPagamento:23,qtdParcelas:24,
  subTotalCompra:25,totalCompra:26,
  utmSource:27,utmContent:28,utmTerm:29,utmVendor:30,
  utmMedium:31,utmCampaign:32,cupom:33,
  checkoutNome:34,checkoutLink:35,followupLink:36,retryLink:37,
  valorVenda:38,quantidadeProduto:39,subTotal:40,total:41
};

var allRows = [];
var metaAdsData = null;
var activePeriod = 30;
var charts = {};

function g(row, idx) {
  var v = row[idx];
  if (v === null || v === undefined) return '';
  if (typeof v === 'object' && v instanceof Date) return v.toISOString();
  return String(v).trim();
}

function parseDate(str) {
  if (!str) return null;
  var s = str.trim();
  var m;
  if ((m = s.match(/^(\d{4})-(\d{2})-(\d{2})/))) return new Date(+m[1],+m[2]-1,+m[3]);
  if ((m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})/))) return new Date(+m[3],+m[2]-1,+m[1]);
  if ((m = s.match(/^(\d{2})-(\d{2})-(\d{4})/))) return new Date(+m[3],+m[2]-1,+m[1]);
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function parseVal(str) {
  if (!str) return 0;
  return parseFloat(String(str).replace(/[^\d.,]/g,'').replace(',','.')) || 0;
}

function normStatus(s) {
  var v = String(s).toLowerCase().trim();
  if (v.indexOf('aprovad')>=0||v.indexOf('pago')>=0||v.indexOf('paga')>=0||v.indexOf('paid')>=0||v.indexOf('approved')>=0||v.indexOf('complet')>=0) return 'aprovado';
  if (v.indexOf('cancel')>=0||v.indexOf('chargeback')>=0) return 'cancelado';
  if (v.indexOf('reembol')>=0||v.indexOf('refund')>=0) return 'reembolsado';
  return 'outro';
}

function filterPeriod(rows, days) {
  if (!days) return rows;
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return rows.filter(function(r) {
    var d = parseDate(g(r,C.dataTransacao)) || parseDate(g(r,C.dataCompra));
    return d && d >= cutoff;
  });
}

function fmt(n) {
  return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
}
function fmtShort(n) {
  if (n>=1000) return 'R$ '+(n/1000).toFixed(1).replace('.',',')+'k';
  return fmt(n);
}
function sClass(s) {
  return s==='aprovado'?'ap':s==='cancelado'?'cn':s==='reembolsado'?'re':'ot';
}
function topN(obj,n) {
  return Object.entries(obj).sort(function(a,b){return b[1]-a[1];}).slice(0,n);
}
function barList(items, max, color, wide) {
  if (!items.length) return '<div class="no-data">Sem dados</div>';
  return items.map(function(it) {
    var pct = Math.round((it[1]/max)*100);
    return '<div class="bar-item"><div class="bar-name'+(wide?' wide':'')+'" title="'+it[0]+'">'+it[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div><div class="bar-val">'+fmtShort(it[1])+'</div></div>';
  }).join('');
}
function normWords(s) {
  return String(s||'').toLowerCase().replace(/[^a-z0-9çãõáéíóúâêô]+/g,' ').split(' ').filter(function(w){return w.length>2;});
}
function matchCampaign(metaName, utmKeys) {
  var metaWords = normWords(metaName);
  var best=null, bestScore=0;
  utmKeys.forEach(function(k){
    var kWords = normWords(k);
    var score = metaWords.filter(function(w){return kWords.indexOf(w)>=0;}).length;
    if (score>bestScore) { bestScore=score; best=k; }
  });
  return bestScore>0 ? best : null;
}
function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); charts[key]=null; }
}

function render(rows) {
  var filtered = filterPeriod(rows, activePeriod);
  var meta = parseInt(document.getElementById('meta-input').value) || 500;

  var semVendas = !filtered.length;

  var receitaAp=0,qtdAp=0,qtdCn=0,qtdRe=0,qtdTotal=0,ingressosAp=0;
  var porDia={},porProd={},porSource={},porMedium={},porCamp={},porTerm={},porContent={};
  var porPagto={},porCupom={},porIngresso={};
  var transacoes=[];
  var receitaCn=0;

  filtered.forEach(function(r) {
    var status = normStatus(g(r,C.status)+' '+g(r,C.descStatus));
    var total = parseVal(g(r,C.total));
    var qtdProduto = parseInt(g(r,C.quantidade)) || 1;
    var produto = g(r,C.produto)||'N/A';
    var source = g(r,C.utmSource)||'direto';
    var medium = g(r,C.utmMedium)||'direto';
    var camp = g(r,C.utmCampaign)||'sem campanha';
    var term = g(r,C.utmTerm)||'sem term';
    var content = g(r,C.utmContent)||'sem content';
    var nome = g(r,C.nomeComprador)||'—';
    var pagto = g(r,C.metodoPagamento)||'não informado';
    var cupom = g(r,C.cupom)||'sem cupom';
    var dateStr = g(r,C.dataTransacao)||g(r,C.dataCompra);
    var d = parseDate(dateStr);
    var dKey = d ? d.toISOString().split('T')[0] : null;

    qtdTotal++;
    if (status==='aprovado'){receitaAp+=total;qtdAp++;ingressosAp+=qtdProduto;}
    if (status==='cancelado'){qtdCn++;receitaCn+=total;}
    if (status==='reembolsado') qtdRe++;

    if (dKey) {
      if (!porDia[dKey]) porDia[dKey]={ap:0,cn:0};
      if (status==='aprovado') porDia[dKey].ap++;
      if (status==='cancelado') porDia[dKey].cn++;
    }

    if (status==='aprovado') {
      porProd[produto]=(porProd[produto]||0)+total;
      porSource[source]=(porSource[source]||0)+total;
      porMedium[medium]=(porMedium[medium]||0)+total;
      porCamp[camp]=(porCamp[camp]||0)+total;
      porTerm[term]=(porTerm[term]||0)+total;
      porContent[content]=(porContent[content]||0)+total;
      if (!porPagto[pagto]) porPagto[pagto]={qtd:0,val:0};
      porPagto[pagto].qtd++;
      porPagto[pagto].val+=total;
      if (cupom && cupom!=='sem cupom') {
        if (!porCupom[cupom]) porCupom[cupom]={qtd:0,val:0};
        porCupom[cupom].qtd++;
        porCupom[cupom].val+=total;
      }
      porIngresso[produto]=(porIngresso[produto]||0)+qtdProduto;
    }

    transacoes.push({d:d,dateStr:dateStr,nome:nome,produto:produto,total:total,status:status,pagto:pagto});
  });

  transacoes.sort(function(a,b){return (b.d||0)-(a.d||0);});

  var taxa = qtdTotal>0 ? Math.round((qtdAp/qtdTotal)*100) : 0;
  var ticket = qtdAp>0 ? receitaAp/qtdAp : 0;
  var metaPct = Math.min(Math.round((ingressosAp/meta)*100),100);
  var metaFaltam = Math.max(meta-ingressosAp,0);

  var dias = Object.keys(porDia).sort().slice(-30);
  var diasLabels = dias.map(function(d){var p=d.split('-');return p[2]+'/'+p[1];});
  var apData = dias.map(function(d){return porDia[d]?porDia[d].ap:0;});
  var cnData = dias.map(function(d){return porDia[d]?porDia[d].cn:0;});

  var topProd=topN(porProd,6),topSource=topN(porSource,5),topMedium=topN(porMedium,4),topCamp=topN(porCamp,6);
  var topTerm=topN(porTerm,6),topContent=topN(porContent,6);
  var topPagto=topN(Object.fromEntries(Object.entries(porPagto).map(function(e){return [e[0],e[1].val];})),5);
  var topCupom=topN(Object.fromEntries(Object.entries(porCupom).map(function(e){return [e[0],e[1].val];})),6);
  var topIngresso=topN(porIngresso,6);

  var maxProd=topProd.length?topProd[0][1]:1;
  var maxSource=topSource.length?topSource[0][1]:1;
  var maxMedium=topMedium.length?topMedium[0][1]:1;
  var maxCamp=topCamp.length?topCamp[0][1]:1;
  var maxTerm=topTerm.length?topTerm[0][1]:1;
  var maxContent=topContent.length?topContent[0][1]:1;
  var maxPagto=topPagto.length?topPagto[0][1]:1;
  var maxCupom=topCupom.length?topCupom[0][1]:1;
  var maxIngresso=topIngresso.length?topIngresso[0][1]:1;

  var prodColors=['#5b8cff','#b18aff','#3ee08f','#ffc24b','#ff6b7a','#2fe0d0'];

  var txRows = transacoes.slice(0,15).map(function(t){
    var dt = t.d ? t.d.toLocaleDateString('pt-BR') : (t.dateStr||'—');
    return '<tr><td class="td-mono">'+dt+'</td><td>'+t.nome+'</td><td style="color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t.produto+'</td><td style="color:var(--muted);font-size:11px">'+t.pagto+'</td><td class="td-mono">'+fmt(t.total)+'</td><td><span class="badge '+sClass(t.status)+'">'+t.status+'</span></td></tr>';
  }).join('');

  var prodRows = topProd.map(function(it,i){
    var pct=Math.round((it[1]/maxProd)*100);
    return '<div class="prod-item"><div class="prod-rank">'+(i+1)+'</div><div class="prod-name" title="'+it[0]+'">'+it[0]+'</div><div class="prod-track"><div class="prod-fill" style="width:'+pct+'%;background:'+prodColors[i]+'"></div></div><div class="prod-val">'+fmtShort(it[1])+'</div></div>';
  }).join('')||'<div class="no-data">Sem vendas aprovadas</div>';

  var ingressoRows = topIngresso.map(function(it,i){
    var pct=Math.round((it[1]/maxIngresso)*100);
    return '<div class="prod-item"><div class="prod-rank">'+(i+1)+'</div><div class="prod-name" title="'+it[0]+'">'+it[0]+'</div><div class="prod-track"><div class="prod-fill" style="width:'+pct+'%;background:'+prodColors[i]+'"></div></div><div class="prod-val">'+it[1]+' und</div></div>';
  }).join('')||'<div class="no-data">Sem dados</div>';

  var pagtoRows = topPagto.map(function(it){
    var qtd = porPagto[it[0]]?porPagto[it[0]].qtd:0;
    return '<div class="pill-item"><div class="pill-name">'+it[0]+'</div><div class="pill-count">'+qtd+'x</div><div class="pill-val">'+fmtShort(it[1])+'</div></div>';
  }).join('')||'<div class="no-data">Sem dados</div>';

  var cupomRows = Object.keys(porCupom).length ?
    topN(Object.fromEntries(Object.entries(porCupom).map(function(e){return [e[0],e[1].qtd];})),6).map(function(it){
      var val = porCupom[it[0]]?porCupom[it[0]].val:0;
      return '<div class="pill-item"><div class="pill-name">'+it[0]+'</div><div class="pill-count">'+it[1]+'x</div><div class="pill-val">'+fmtShort(val)+'</div></div>';
    }).join('') : '<div class="no-data">Nenhum cupom usado ainda</div>';

  var roasSection = '';
  if (metaAdsData && metaAdsData.items) {
    var utmKeys = Object.keys(porCamp);
    var realRoasTotal = metaAdsData.totalSpend>0 ? (receitaAp/metaAdsData.totalSpend) : 0;
    var diffPct = metaAdsData.totalRevenue>0 ? Math.round(((receitaAp-metaAdsData.totalRevenue)/metaAdsData.totalRevenue)*100) : null;
    var roasRows = metaAdsData.items.filter(function(it){return it.spend>0;}).sort(function(a,b){return b.spend-a.spend;}).map(function(it){
      var matched = matchCampaign(it.campaign, utmKeys);
      var realRev = matched ? porCamp[matched] : 0;
      var realRoasC = it.spend>0 ? (realRev/it.spend) : 0;
      return '<tr><td style="color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+it.campaign+'">'+it.campaign+'</td>'+
        '<td class="td-mono">'+fmt(it.spend)+'</td>'+
        '<td class="td-mono">'+fmt(it.revenue)+'</td>'+
        '<td class="td-mono">'+it.roas.toFixed(2)+'x</td>'+
        '<td class="td-mono">'+(matched?fmt(realRev):'—')+'</td>'+
        '<td class="td-mono" style="color:'+(matched?(realRoasC>=it.roas?'var(--green)':'var(--red)'):'var(--muted)')+'">'+(matched?realRoasC.toFixed(2)+'x':'sem match')+'</td></tr>';
    }).join('');
    roasSection =
      '<div class="card" style="margin-bottom:18px"><div class="card-header"><div><div class="card-title">ROAS — Meta Ads vs. Checkout real</div><div class="card-sub">comparação entre o que o Meta reporta e o que realmente caiu na planilha</div></div></div>' +
        '<div class="kpi-grid" style="margin-bottom:16px">' +
          '<div class="kpi-card amber"><div class="kpi-label">Gasto no Meta Ads</div><div class="kpi-value amber">'+fmt(metaAdsData.totalSpend)+'</div><div class="kpi-delta">período selecionado</div></div>' +
          '<div class="kpi-card purple"><div class="kpi-label">Receita reportada (Meta)</div><div class="kpi-value purple">'+fmt(metaAdsData.totalRevenue)+'</div><div class="kpi-delta">ROAS Meta: '+metaAdsData.totalRoas.toFixed(2)+'x</div></div>' +
          '<div class="kpi-card green"><div class="kpi-label">Receita real (checkout)</div><div class="kpi-value green">'+fmt(receitaAp)+'</div><div class="kpi-delta">ROAS real: '+realRoasTotal.toFixed(2)+'x</div></div>' +
          '<div class="kpi-card '+(diffPct===null?'teal':(diffPct<0?'red':'teal'))+'"><div class="kpi-label">Diferença de tracking</div><div class="kpi-value '+(diffPct===null?'teal':(diffPct<0?'red':'teal'))+'">'+(diffPct===null?'—':(diffPct>0?'+':'')+diffPct+'%')+'</div><div class="kpi-delta">real vs. reportado pelo Meta</div></div>' +
        '</div>' +
        '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Campanha (Meta)</th><th>Gasto</th><th>Receita Meta</th><th>ROAS Meta</th><th>Receita real</th><th>ROAS real</th></tr></thead><tbody>'+(roasRows||'<tr><td colspan="6" class="no-data">Sem campanhas com gasto no período</td></tr>')+'</tbody></table></div>' +
      '</div>';
  } else if (SCRIPT_URL_META) {
    roasSection = '<div class="card" style="margin-bottom:18px"><div class="card-header"><div><div class="card-title">ROAS — Meta Ads vs. Checkout real</div></div></div><div class="no-data">Não foi possível carregar os dados do Meta Ads.</div></div>';
  }

  document.getElementById('main-content').innerHTML =

    (semVendas ? '<div class="empty-box" style="margin-bottom:14px"><div style="font-size:14px;color:var(--text);margin-bottom:4px">📊 Nenhuma venda registrada ainda neste período</div><div>O dashboard abaixo já está pronto e vai preencher automaticamente assim que a Goexplosion registrar as primeiras transações. Linhas na planilha: '+rows.length+'.</div></div>' : '') +

    // BARRA DE META
    '<div class="meta-card">' +
      '<div class="meta-header">' +
        '<div><div class="meta-title">Progresso da meta de ingressos</div><div class="meta-sub">Vendidos vs. meta definida no topo</div></div>' +
        '<div class="meta-pct">'+metaPct+'%</div>' +
      '</div>' +
      '<div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>' +
      '<div class="meta-stats">' +
        '<div class="meta-stat"><strong>'+ingressosAp+'</strong> vendidos</div>' +
        '<div class="meta-stat"><strong>'+metaFaltam+'</strong> faltam</div>' +
        '<div class="meta-stat">Meta: <strong>'+meta+'</strong></div>' +
        '<div class="meta-stat">Receita: <strong>'+fmt(receitaAp)+'</strong></div>' +
      '</div>' +
    '</div>' +

    // KPIs
    '<div class="kpi-grid">' +
      '<div class="kpi-card green"><div class="kpi-label">Receita aprovada</div><div class="kpi-value green">'+fmt(receitaAp)+'</div><div class="kpi-delta">'+qtdAp+' venda'+(qtdAp!==1?'s':'')+'</div></div>' +
      '<div class="kpi-card red"><div class="kpi-label">Cancelamentos</div><div class="kpi-value red">'+qtdCn+'</div><div class="kpi-delta">'+fmt(receitaCn)+' perdidos</div></div>' +
      '<div class="kpi-card amber"><div class="kpi-label">Taxa de aprovação</div><div class="kpi-value amber">'+taxa+'%</div><div class="kpi-delta">'+qtdTotal+' transaç'+(qtdTotal===1?'ão':'ões')+'</div></div>' +
      '<div class="kpi-card purple"><div class="kpi-label">Ticket médio</div><div class="kpi-value purple">'+fmt(ticket)+'</div><div class="kpi-delta">por venda aprovada</div></div>' +
      '<div class="kpi-card teal"><div class="kpi-label">Reembolsos</div><div class="kpi-value teal">'+qtdRe+'</div><div class="kpi-delta">'+(qtdTotal>0?Math.round((qtdRe/qtdTotal)*100):0)+'% do total</div></div>' +
    '</div>' +

    roasSection +

    // LINHA: gráfico + UTM
    '<div class="row2">' +
      '<div class="card"><div class="card-header"><div><div class="card-title">Vendas por dia</div><div class="card-sub">aprovadas vs cancelamentos</div></div></div><div class="chart-wrap"><canvas id="lineChart"></canvas></div></div>' +
      '<div class="card"><div class="card-header"><div><div class="card-title">Desempenho UTM</div><div class="card-sub">receita por origem</div></div></div>' +
        '<div class="utm-section"><div class="utm-label">Source</div>'+barList(topSource,maxSource,'var(--accent)',true)+'</div>' +
        '<div class="utm-section"><div class="utm-label">Medium</div>'+barList(topMedium,maxMedium,'var(--purple)',true)+'</div>' +
      '</div>' +
    '</div>' +

    // LINHA: produtos + ingressos + campanhas
    '<div class="row3">' +
      '<div class="card"><div class="card-header"><div><div class="card-title">Receita por produto</div><div class="card-sub">valor aprovado</div></div></div>'+prodRows+'</div>' +
      '<div class="card"><div class="card-header"><div><div class="card-title">Ingressos vendidos</div><div class="card-sub">quantidade por tipo</div></div></div>'+ingressoRows+'</div>' +
      '<div class="card"><div class="card-header"><div><div class="card-title">Top campaigns</div><div class="card-sub">UTM Campaign</div></div></div>'+barList(topCamp,maxCamp,'#3ee08f',true)+'</div>' +
    '</div>' +

    // LINHA: term + content
    '<div class="row2">' +
      '<div class="card"><div class="card-header"><div><div class="card-title">UTM Term</div><div class="card-sub">receita por termo</div></div></div>'+barList(topTerm,maxTerm,'#ffc24b',true)+'</div>' +
      '<div class="card"><div class="card-header"><div><div class="card-title">UTM Content</div><div class="card-sub">receita por conteúdo</div></div></div>'+barList(topContent,maxContent,'#ff6b7a',true)+'</div>' +
    '</div>' +

    // LINHA: tabela + pagamento + cupom
    '<div class="row4">' +
      '<div class="card"><div class="card-header"><div><div class="card-title">Últimas transações</div><div class="card-sub">mais recentes primeiro</div></div></div><div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Comprador</th><th>Produto</th><th>Pagamento</th><th>Valor</th><th>Status</th></tr></thead><tbody>'+txRows+'</tbody></table></div></div>' +
      '<div style="display:flex;flex-direction:column;gap:12px">' +
        '<div class="card"><div class="card-header"><div><div class="card-title">Método de pagamento</div><div class="card-sub">receita e qtd aprovadas</div></div></div><div class="pill-list">'+pagtoRows+'</div></div>' +
        '<div class="card"><div class="card-header"><div><div class="card-title">Cupons utilizados</div><div class="card-sub">qtd de uso e receita gerada</div></div></div><div class="pill-list">'+cupomRows+'</div></div>' +
      '</div>' +
    '</div>' +

    '<div class="footer"><span><span class="footer-dot"></span>'+(semVendas?'Aguardando primeiras vendas — Goexplosion':'Dados ao vivo — Goexplosion')+'</span><span>Atualizado: '+new Date().toLocaleString('pt-BR')+'</span></div>';

  // Animar barra de progresso
  setTimeout(function(){
    var el = document.getElementById('prog-fill');
    if (el) el.style.width = metaPct+'%';
  }, 100);

  // Gráfico de linha
  destroyChart('line');
  var ctx = document.getElementById('lineChart');
  if (ctx && dias.length) {
    charts.line = new Chart(ctx, {
      type:'line',
      data:{
        labels:diasLabels,
        datasets:[
          {label:'Aprovadas',data:apData,borderColor:'#5b8cff',backgroundColor:'rgba(91,140,255,0.12)',borderWidth:2,pointRadius:3,pointHoverRadius:5,tension:0.4,fill:true},
          {label:'Cancelamentos',data:cnData,borderColor:'#ff6b7a',backgroundColor:'rgba(255,107,122,0.08)',borderWidth:1.5,pointRadius:3,pointHoverRadius:5,tension:0.4,fill:true}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{position:'bottom',labels:{color:'#8b8f9c',font:{size:11,family:'Inter'},boxWidth:10,padding:12}},
          tooltip:{backgroundColor:'#1c2029',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#f5f6f8',bodyColor:'#8b8f9c',cornerRadius:8,padding:10}
        },
        scales:{
          x:{ticks:{color:'#5b5f6b',font:{size:10},maxTicksLimit:10},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}},
          y:{ticks:{color:'#5b5f6b',font:{size:10},stepSize:1},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false},beginAtZero:true}
        }
      }
    });
  }
}

function loadData() {
  document.getElementById('main-content').innerHTML = '<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Carregando dados da planilha...</div></div>';
  var controller = new AbortController();
  var timeout = setTimeout(function(){controller.abort();}, 15000);
  fetch(SCRIPT_URL, {signal: controller.signal, redirect: 'follow', mode: 'cors'})
    .then(function(res){
      clearTimeout(timeout);
      if (!res.ok) throw new Error('HTTP '+res.status);
      return res.json();
    })
    .then(function(data){
      // Suporte a array direto ou objeto {data:[...]}
      var matrix = Array.isArray(data) ? data : (data.data || []);
      if (!matrix.length) throw new Error('Resposta vazia do Apps Script.');
      // Detectar se tem linha de grupos ou começa direto nos cabeçalhos
      var primeiraLinha = String(matrix[0][0]||'').toLowerCase();
      var startIdx = (primeiraLinha.indexOf('pedido')>=0 || primeiraLinha.indexOf('ordeid')>=0 || primeiraLinha==='') ? 2 : 1;
      allRows = matrix.slice(startIdx).filter(function(r){
        return r.some(function(c){return c!==''&&c!==null&&c!==undefined;});
      });
      render(allRows);
    })
    .catch(function(e){
      document.getElementById('main-content').innerHTML =
        '<div class="error-box"><strong>Não foi possível carregar os dados.</strong><br><br>Erro: '+e.message+'<br><br>Verifique se o Apps Script está implantado com acesso <strong>"Qualquer pessoa"</strong> e tente novamente.</div>';
    });
  loadMetaAdsData();
}

function loadMetaAdsData() {
  if (!SCRIPT_URL_META) { metaAdsData = null; if (allRows.length) render(allRows); return; }
  var days = activePeriod || '0';
  fetch(SCRIPT_URL_META + '?days=' + days, {redirect: 'follow', mode: 'cors'})
    .then(function(res){ return res.json(); })
    .then(function(data){
      metaAdsData = (data && !data.error) ? data : null;
      if (allRows.length) render(allRows);
    })
    .catch(function(){ metaAdsData = null; });
}

document.querySelectorAll('[data-period]').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('[data-period]').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    activePeriod = parseInt(btn.getAttribute('data-period'));
    loadMetaAdsData();
    if (allRows.length) render(allRows);
  });
});

document.getElementById('refresh-btn').addEventListener('click', loadData);
document.getElementById('meta-input').addEventListener('change', function(){
  if (allRows.length) render(allRows);
});

loadData();
</script>
</body>
</html>
